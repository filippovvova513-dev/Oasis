<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    .footer {
      background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
      color: #ffffff;
      padding: 40px 48px;
      margin-top: auto;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .footer-quote {
      font-size: 1.3rem;
      font-style: italic;
      color: #e3f2fd;
      text-align: center;
      margin-bottom: 8px;
    }

    .footer-divider {
      width: 200px;
      height: 2px;
      background: linear-gradient(to right, transparent, #bbdefb, transparent);
    }

    .footer-contacts {
      display: flex;
      justify-content: center;
      gap: 48px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #e3f2fd;
      font-size: 1.1rem;
    }

    .contact-item svg {
      width: 24px;
      height: 24px;
      color: #bbdefb;
    }

    .footer-copyright {
      font-size: 0.9rem;
      color: #bbdefb;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-quote">«Литература для души и ума!»</div>
      <div class="footer-divider"></div>
      <div class="footer-contacts">
        <div class="contact-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span>Ул. Бамбуково, д.13</span>
        </div>
        <div class="contact-item">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
          <span>+7 921 756 77 44</span>
        </div>
      </div>
      <div class="footer-copyright">
        © 2024 Литературный Оазис. Все права защищены.
      </div>
    </div>
  </footer>
</body>
</html>
