<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Литературный Оазис - Книжный магазин</title>
    <style>
        :root {
            --primary-color: #8B4513;
            --secondary-color: #D2691E;
            --accent-color: #FF8C00;
            --light-color: #FFF8DC;
            --dark-color: #5D4037;
            --text-color: #3E2723;
            --buy-color: #6B8E23;
            --buy-hover: #556B2F;
            --shadow-sm: 0 2px 8px rgba(139, 69, 19, 0.1);
            --shadow-md: 0 4px 16px rgba(139, 69, 19, 0.15);
            --shadow-lg: 0 8px 32px rgba(139, 69, 19, 0.2);
            --shadow-interactive: 0 4px 12px rgba(210, 105, 30, 0.25);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(rgba(255, 248, 220, 0.9), rgba(255, 248, 220, 0.95)), url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400"><defs><pattern id="books" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><rect fill="%23F5E6D3" opacity="0.4" x="0" y="0" width="40" height="40"/><path fill="%23D2691E" opacity="0.15" d="M8,8 L32,8 L32,32 L8,32 Z M10,10 L30,10 L30,30 L10,30 Z M12,12 L28,12 L28,18 L12,18 Z M12,20 L28,20 L28,26 L12,26 Z"/></pattern></defs><rect fill="url(%23books)" width="400" height="400"/></svg>'), #FFF8DC;
            background-size: 400px 400px, auto;
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== СТИЛИЗОВАННЫЕ ИКОНКИ ===== */
        .icon-img { width: 20px; height: 20px; object-fit: contain; vertical-align: middle; }
        .icon-img-sm { width: 16px; height: 16px; }
        .icon-img-lg { width: 28px; height: 28px; }

        /* ===== МОДАЛЬНЫЕ ОКНА ===== */
        .random-book-modal, .book-detail-modal, .user-orders-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(93, 64, 55, 0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .random-book-modal.active, .book-detail-modal.active, .user-orders-modal.active { display: flex; }
        
        .random-book-container, .book-detail-container, .user-orders-container {
            background: var(--light-color);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 3px solid var(--primary-color);
            box-shadow: var(--shadow-lg);
            position: relative;
        }
        
        .random-book-header, .book-detail-header, .user-orders-header {
            padding: 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-color);
        }
        
        .close-random-book-btn, .close-detail-btn, .close-orders-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        .random-book-content, .book-detail-content, .user-orders-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        /* Стили для модального окна деталей книги - картинка слева, информация справа */
        .book-detail-image-container {
            flex: 0 0 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .book-detail-image {
            width: 100%;
            max-width: 220px;
            height: 320px;
            object-fit: contain;
            border-radius: var(--radius-lg);
            border: 4px solid var(--primary-color);
            box-shadow: var(--shadow-lg);
            background: white;
            padding: 10px;
        }
        .book-detail-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .book-detail-name {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 800;
        }
        .book-detail-author {
            font-size: 22px;
            color: var(--secondary-color);
            margin-bottom: 20px;
            font-style: italic;
            border-bottom: 2px solid rgba(210, 105, 30, 0.2);
            padding-bottom: 15px;
        }
        .book-detail-description {
            font-size: 17px;
            line-height: 1.8;
            color: var(--text-color);
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-md);
            border-left: 4px solid var(--accent-color);
        }
        .book-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .book-detail-item {
            background: linear-gradient(135deg, rgba(255, 248, 220, 0.8), rgba(245, 230, 211, 0.9));
            padding: 15px;
            border-radius: var(--radius-md);
            border: 2px solid rgba(139, 69, 19, 0.2);
        }
        .book-detail-label {
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .book-detail-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-color);
        }
        .book-detail-price {
            font-size: 36px;
            color: #228B22;
            font-weight: 800;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(34, 139, 34, 0.1), rgba(50, 205, 50, 0.05));
            border-radius: var(--radius-lg);
            border: 3px solid rgba(34, 139, 34, 0.2);
            margin: 20px 0;
        }
        .book-detail-actions {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .book-detail-cart-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: var(--shadow-md);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        .book-detail-cart-btn:hover {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .book-detail-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .book-detail-genre {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .random-book-image-container {
            flex: 0 0 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .random-book-image {
            width: 100%;
            max-width: 220px;
            height: 320px;
            object-fit: contain;
            border-radius: var(--radius-lg);
            border: 4px solid var(--primary-color);
            box-shadow: var(--shadow-lg);
            background: white;
            padding: 10px;
        }
        .random-book-main { flex: 1; display: flex; flex-direction: column; }
        .random-book-name {
            font-size: 32px;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 800;
        }
        .random-book-author {
            font-size: 22px;
            color: var(--secondary-color);
            margin-bottom: 20px;
            font-style: italic;
            border-bottom: 2px solid rgba(210, 105, 30, 0.2);
            padding-bottom: 15px;
        }
        .random-book-description {
            font-size: 17px;
            line-height: 1.8;
            color: var(--text-color);
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-md);
            border-left: 4px solid var(--accent-color);
        }
        .random-book-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .random-book-detail-item {
            background: linear-gradient(135deg, rgba(255, 248, 220, 0.8), rgba(245, 230, 211, 0.9));
            padding: 15px;
            border-radius: var(--radius-md);
            border: 2px solid rgba(139, 69, 19, 0.2);
        }
        .random-book-detail-label {
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .random-book-detail-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-color);
        }
        .random-book-price {
            font-size: 36px;
            color: #228B22;
            font-weight: 800;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(34, 139, 34, 0.1), rgba(50, 205, 50, 0.05));
            border-radius: var(--radius-lg);
            border: 3px solid rgba(34, 139, 34, 0.2);
            margin: 20px 0;
        }
        .random-book-actions {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .random-book-cart-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: var(--shadow-md);
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        .random-book-cart-btn:hover {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .random-book-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .random-book-genre {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .random-book-message {
            background: linear-gradient(135deg, rgba(139, 69, 19, 0.1), rgba(210, 105, 30, 0.05));
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 3px solid rgba(255, 140, 0, 0.2);
            margin: 20px 0;
        }
        .random-book-tag {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FF8C00, #FFA500);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            z-index: 10;
            border: 3px solid var(--light-color);
        }

        @media (max-width: 768px) {
            .random-book-content, .book-detail-content { flex-direction: column; }
            .random-book-actions, .book-detail-actions { flex-direction: column; }
        }

        .close-auth-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--dark-color);
            transition: var(--transition);
            z-index: 10;
        }
        .close-auth-btn:hover { transform: rotate(90deg); color: var(--accent-color); }
        .auth-form { position: relative; }
        .auth-tabs {
            display: flex;
            border-bottom: 3px solid var(--primary-color);
        }
        .auth-tab {
            flex: 1;
            padding: 16px;
            background: none;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            color: var(--dark-color);
            transition: var(--transition);
            position: relative;
        }
        .auth-tab.active { color: var(--primary-color); }
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent-color);
            border-radius: 3px 3px 0 0;
        }

        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        .main-banner { background: linear-gradient(135deg, var(--light-color) 0%, #F5E6D3 100%); padding: 80px 20px 40px 20px; margin-bottom: 40px; border-bottom: 3px solid var(--primary-color); box-shadow: var(--shadow-lg); position: relative; border-radius: 0 0 var(--radius-lg) var(--radius-lg); margin-top: -1px; min-height: 320px; display: flex; align-items: center; overflow: visible; }
        .banner-content { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; justify-content: center; position: relative; padding: 0 30px 0 260px; width: 100%; }
        .banner-text { flex: 1; text-align: center; position: relative; z-index: 1; }
        .banner-logo-corner { position: absolute; top: -50px; left: 50px; z-index: 10; animation: floatLogo 3s ease-in-out infinite; cursor: pointer; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(1deg); } }
        .banner-logo-frame { width: 240px; height: 240px; background: linear-gradient(135deg, #FFF8DC 0%, #F5E6D3 50%, #E8D5B5 100%); border-radius: 50%; border: 12px solid var(--primary-color); box-shadow: var(--shadow-lg), 0 0 60px rgba(139, 69, 19, 0.4), 0 0 30px rgba(255, 140, 0, 0.2); display: flex; align-items: center; justify-content: center; position: relative; overflow: visible; transition: var(--transition); }
        .banner-logo-frame:hover { transform: scale(1.03); border-color: var(--accent-color); }
        .banner-logo-frame::before { content: ''; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px; border: 4px solid var(--accent-color); border-radius: 50%; z-index: 1; animation: pulseRing 2s ease-in-out infinite; }
        @keyframes pulseRing { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        .banner-logo-inner { width: 190px; height: 190px; border-radius: 50%; overflow: hidden; border: 8px solid var(--secondary-color); box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(210, 105, 30, 0.4); position: relative; z-index: 2; background: linear-gradient(45deg, #FFF8DC, #F5E6D3); }
        .banner-logo-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease, filter 0.8s ease; filter: sepia(0.2) brightness(1.05); }
        .banner-logo-img:hover { transform: scale(1.15); filter: sepia(0) brightness(1.1); }
        .banner-logo-hint { position: absolute; top: -25px; right: -25px; background: linear-gradient(135deg, var(--accent-color), #FFA500); color: white; padding: 12px 18px; border-radius: 30px; font-size: 14px; font-weight: 700; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px; z-index: 20; animation: bounceHint 2s ease-in-out infinite; white-space: nowrap; border: 3px solid white; }
        @keyframes bounceHint { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-5px) scale(1.05); } }
        .banner-logo-hint::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 16px; height: 16px; background: linear-gradient(135deg, var(--accent-color), #FFA500); border-radius: 3px; z-index: -1; }
        .banner-logo-hint-arrow { font-size: 18px; animation: arrowPulse 1.5s ease-in-out infinite; }
        @keyframes arrowPulse { 0%, 100% { transform: translateX(0); opacity: 1; } 50% { transform: translateX(3px); opacity: 0.7; } }
        .banner-subtitle { font-size: 22px; color: var(--secondary-color); margin-bottom: 15px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1); }
        .banner-title { font-size: 64px; font-weight: 900; margin-bottom: 30px; color: var(--primary-color); line-height: 1.1; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2); letter-spacing: 1px; }
        .banner-slogan { font-size: 24px; color: var(--secondary-color); margin-bottom: 40px; font-style: italic; font-weight: 500; opacity: 0.9; max-width: 800px; margin-left: auto; margin-right: auto; line-height: 1.4; }
        .banner-contacts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .contact-item { display: flex; flex-direction: column; padding: 25px 20px; background: linear-gradient(135deg, #FFF0E0 0%, #FFEBD7 100%); border-radius: var(--radius-lg); border: 3px solid rgba(210, 105, 30, 0.3); box-shadow: var(--shadow-md); transition: var(--transition); min-height: 120px; justify-content: center; backdrop-filter: blur(5px); position: relative; overflow: hidden; }
        .contact-item::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent-color), var(--secondary-color)); border-radius: 4px 4px 0 0; }
        .contact-item:hover { transform: translateY(-5px) scale(1.02); border-color: var(--accent-color); box-shadow: var(--shadow-lg); background: linear-gradient(135deg, #FFEBD7 0%, #FFE4CC 100%); }
        .contact-label { font-size: 16px; color: var(--primary-color); margin-bottom: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .contact-value { font-size: 20px; font-weight: 700; color: var(--dark-color); line-height: 1.3; }
        @media (max-width: 1024px) { .banner-logo-frame { width: 200px; height: 200px; } .banner-logo-inner { width: 160px; height: 160px; } .banner-content { padding: 0 30px 0 220px; } .banner-logo-corner { left: 30px; } .banner-logo-hint { top: -20px; right: -20px; padding: 10px 15px; font-size: 13px; } .banner-contacts { grid-template-columns: repeat(2, 1fr); } .banner-title { font-size: 48px; } .banner-slogan { font-size: 20px; } }
        @media (max-width: 768px) { .banner-logo-corner { position: relative; top: 0; left: 0; margin: 0 auto 30px auto; } .banner-logo-frame { width: 180px; height: 180px; } .banner-logo-inner { width: 140px; height: 140px; } .banner-content { flex-direction: column; padding: 0 20px; } .main-banner { padding: 40px 20px; } .banner-logo-hint { top: -15px; right: -15px; padding: 8px 12px; font-size: 12px; } .banner-title { font-size: 36px; } .banner-subtitle { font-size: 18px; } .banner-slogan { font-size: 18px; } .banner-contacts { grid-template-columns: 1fr; } }
        @media (max-width: 480px) { .banner-title { font-size: 32px; } .banner-subtitle { font-size: 16px; } .banner-slogan { font-size: 16px; } .contact-item { padding: 15px; } .main-banner { padding: 40px 20px; } }
        .container { max-width: 1300px; margin: auto; padding: 0 30px; }
        
        /* ===== ШАПКА - БЕЗ ЛОГОТИПА, ВСЕ ЭЛЕМЕНТЫ РАВНОМЕРНО РАСПРЕДЕЛЕНЫ ===== */
        .header {
            background: linear-gradient(135deg, var(--light-color), #F5E6D3);
            border-bottom: 4px solid var(--primary-color);
            box-shadow: var(--shadow-lg);
            width: 100%;
            position: relative;
            z-index: 1001;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 30px;
            width: 100%;
        }

        .nav {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            flex: 2;
            justify-content: flex-start;
        }

        .nav-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--dark-color);
            padding: 8px 14px;
            border-radius: var(--radius-md);
            transition: var(--transition);
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            position: relative;
            border: 2px solid transparent;
            background: rgba(139, 69, 19, 0.05);
        }

        .nav-item:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: linear-gradient(135deg, #DC143C, #B22222);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border: 2px solid var(--light-color);
        }

        .header-search {
            display: flex;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .search-input {
            padding: 8px 14px;
            border: 2px solid var(--primary-color);
            border-radius: var(--radius-md);
            font-size: 13px;
            background: white;
            width: 220px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: var(--shadow-interactive);
            transform: translateY(-2px);
        }

        .search-button {
            padding: 8px 14px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-button:hover {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            transform: translateY(-2px);
            box-shadow: var(--shadow-interactive);
        }
