<!DOCTYPE html>

    .container {

    .contact-item {

    }
    .contact-item svg {
      width: 24px;
      height: 24px;
      margin-right: 15px;

    .map-placeholder {

      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
